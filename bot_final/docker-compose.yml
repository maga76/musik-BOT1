version: "3.9"

services:
  bot:
    build: .
    container_name: telegram_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Dushanbe
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; asyncio.run(__import__('aiohttp').ClientSession().close())"]
      interval: 30s
      timeout: 10s
      retries: 3
